<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameX Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#090d22,#131b46,#050816);
overflow:hidden;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,#00e5ff22 2px,transparent 3px);
background-size:60px 60px;
animation:move 25s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-60px,-60px);}
}

/* Login Card */

.container{
position:relative;
z-index:10;
width:390px;
background:rgba(18,18,35,.9);
padding:40px;
border-radius:20px;
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 35px rgba(0,255,255,.2);
}

.logo{
font-family:'Orbitron';
font-size:38px;
font-weight:700;
text-align:center;
color:#00e5ff;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#ccc;
margin-bottom:35px;
}

.input-group{
margin-bottom:20px;
}

label{
display:block;
color:#fff;
margin-bottom:8px;
font-size:14px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:10px;
background:#222843;
color:white;
font-size:15px;
transition:.3s;
}

input:focus{
box-shadow:0 0 10px #00e5ff;
}

.password-box{
position:relative;
}

.password-box span{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#aaa;
font-size:14px;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:13px;
color:#ddd;
}

.options a{
color:#00e5ff;
text-decoration:none;
}

.login-btn{
width:100%;
padding:14px;
background:#00e5ff;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
margin-bottom:20px;
}

.login-btn:hover{
background:#00c4de;
transform:scale(1.02);
}

.or{
text-align:center;
color:#999;
margin:15px 0;
}

.google-btn{
width:100%;
padding:13px;
background:white;
border:none;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.google-btn:hover{
background:#f3f3f3;
}

.google-btn img{
width:22px;
}

.signup{
margin-top:25px;
text-align:center;
color:#ccc;
font-size:14px;
}

.signup a{
color:#00e5ff;
text-decoration:none;
font-weight:600;
}

@media(max-width:430px){

.container{
width:92%;
padding:30px;
}

.logo{
font-size:30px;
}

}

</style>

</head>
<body>

<div class="container">

<div class="logo">GameX</div>

<p class="subtitle">Login to Continue Gaming</p>

<form>

<div class="input-group">
<label>Email Address</label>
<input
type="email"
id="email"
placeholder="Enter your Gmail"
required>
</div>

<div class="input-group">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<span onclick="togglePassword()">👁</span>

</div>

</div>

<div class="options">

<label>
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="button" class="login-btn" onclick="emailLogin()">
LOGIN
</button>

</form>

<div class="or">
──────── OR ────────
</div>

<button type="button" class="google-btn" onclick="googleLogin()">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Continue with Google

</button>

<div class="signup">
Don't have an account?
<a href="signup.html">Create Account</a>
</div>

</div>
<!-- Firebase App (core SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>

<!-- Firebase Authentication -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<!-- Firestore (optional, if you want to store user data) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>


<!-- Firebase SDK -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyAnKymEsQ_rm-DdzmF_IZfeYgMlHxvPVW8",
  authDomain: "gamex-8a6c8.firebaseapp.com",
  projectId: "gamex-8a6c8",
  storageBucket: "gamex-8a6c8.firebasestorage.app",
  messagingSenderId: "779198723458",
  appId: "1:779198723458:web:fddda7db06a7dd97510b9b",
  measurementId: "G-PFLVKGJBS9"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();



// =====================
// Google Login
// =====================

window.googleLogin = function(){

signInWithPopup(auth, provider)
.then((result)=>{

alert("Welcome " + result.user.displayName);

window.location.href="afterlogin.html";


})
.catch((error)=>{

alert(error.message);

});

}


// =====================
// Email Login
// =====================

window.emailLogin = function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

alert("Login Successful");

window.location.href="afterlogin.html";


})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
