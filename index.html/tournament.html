<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Tournament 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
}

/* Header */
header{
    background:linear-gradient(135deg,#ff0066,#6600ff);
    padding:20px 10%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition:0.3s;
}

nav a:hover{
    color:yellow;
}

/* Hero */
.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1600&q=80') center/cover;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

.hero-content{
    position:relative;
    z-index:1;
}

.hero h1{
    font-size:4rem;
    color:#00ffff;
}

.hero p{
    margin:20px 0;
    font-size:1.2rem;
}

.btn{
    padding:15px 35px;
    background:#ff0066;
    color:white;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#00ffff;
    color:black;
}

/* Tournament Cards */
.section{
    padding:80px 10%;
}

.section-title{
    text-align:center;
    font-size:2.5rem;
    margin-bottom:50px;
    color:#00ffff;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:#151515;
    padding:25px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}



.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px #00ffff;
}

.card h3{
    margin-bottom:15px;
    color:#ff0066;
}

.card p{
    margin-bottom:15px;
}

/* Prize Pool */
.prize{
    background:linear-gradient(135deg,#6600ff,#ff0066);
    text-align:center;
    padding:70px 10%;
}

.prize h2{
    font-size:3rem;
}

.prize h1{
    font-size:5rem;
    color:yellow;
    margin-top:20px;
}

/* Registration */
.form-container{
    max-width:600px;
    margin:auto;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:#111;
}

@media(max-width:768px){
.hero h1{
font-size:2.5rem;
}
.prize h1{
font-size:3rem;
}
}
</style>
</head>
<body>

<header>
    <div class="logo">🎮 GameX eSoprts</div>

    <nav>
        <a href="#">Home</a>
        <a href="#games">Games</a>
        <a href="login.google.html">Login</a>
        <a href="#prize">Prize Pool</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Ultimate Gaming Tournament</h1>
        <p>Compete. Win. Become a Legend.</p>
        <button class="btn" onclick="document.getElementById('login').scrollIntoView({behavior:'smooth'})">
    Login Now
</button>
    </div>
</section>


        

    </div>
</section>

<section class="prize" id="prize">
    <h2>Total Prize Pool</h2>
    <h1>₹10,000</h1>
</section>

<section class="section" id="login">
    <h2 class="section-title">Player Login</h2>

    <div class="form-container" style="text-align:center;">
        <button class="btn" onclick="window.location.href='login.html'">Login</button>
    </div>
</section>

<footer>
    <p>© 2026 GAMEX Tournament | All Rights Reserved</p>
</footer>

<script>

function googleLogin(){

    alert("Redirecting to Login Page...");

    window.location.href="login.html";

}

function togglePassword(){

let password=document.getElementById("password");

if(password){
    password.type=password.type==="password"?"text":"password";
}

}

</script>

</body>
</html>
